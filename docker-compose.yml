services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brimble
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "7402:7402"   # deployed apps  →  http://<slug>.localhost:7402
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 5s
      timeout: 5s
      retries: 10

  buildkit:
    image: moby/buildkit:latest
    restart: unless-stopped
    privileged: true
    command: ["--addr", "tcp://0.0.0.0:1234"]
    volumes:
      - buildkit_data:/var/lib/buildkit
    healthcheck:
      test: ["CMD", "buildctl", "--addr", "tcp://localhost:1234", "debug", "workers"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .                          # monorepo root → gives access to root package-lock.json
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "7401:3001"   # REST API + SSE streams
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./uploads:/app/uploads
      - railpack_cache:/cache              # Railpack build cache
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/brimble
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CADDY_ADMIN_URL: http://caddy:2019
      CADDY_PUBLIC_PORT: "7402"
      ENCRYPTION_KEY: "change-me-to-a-random-secret-minimum-32-chars"
      API_BASE_URL: "http://localhost:7401"
      GITHUB_WEBHOOK_SECRET: ""           # optional — set to enable webhook HMAC verification
      RAILPACK_CACHE_DIR: "/cache"
      DOCKER_BUILDKIT: "1"
      DOCKER_SOCKET: "/var/run/docker.sock"
      BUILDKIT_HOST: "tcp://buildkit:1234"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      caddy:
        condition: service_healthy
      buildkit:
        condition: service_healthy

  web:
    build:
      context: .                          # monorepo root
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:7401
    restart: unless-stopped
    ports:
      - "7400:80"     # dashboard  →  http://localhost:7400
    depends_on:
      - api

volumes:
  pgdata:
  railpack_cache:                         # persists Railpack build cache across restarts
  buildkit_data:                          # persists BuildKit layer cache across restarts
